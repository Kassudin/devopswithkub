apiVersion: apps/v1
kind: Deployment
metadata:
  name:  log-output
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-log
          emptyDir: {}
      containers:
      - name: log-generator
        image: kassudin/log-output-generator:1.3
        volumeMounts:
          - name: shared-log
            mountPath: /usr/src/app/files
      - name: log-reader
        image: kassudin/log-reader:1.4
        volumeMounts:
          - name: shared-log
            mountPath: /usr/src/app/files
