apiVersion: apps/v1
kind: Deployment
metadata:
  name:  todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: todo-volume
          persistentVolumeClaim:
            claimName: todo-claim
      containers:
      - name: todo-app
        image: kassudin/todo-app:1.2
        volumeMounts:
          - name: todo-volume
            mountPath: /usr/src/app/files
